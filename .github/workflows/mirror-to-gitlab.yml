# ---------------------------------------------------------------------------
# Mirror to GitLab — Push merged branches to UCSC GitLab
#
# Triggers on push to main/develop (i.e., when a PR is merged on GitHub).
# Pushes the exact same commit objects to the corresponding branch on GitLab.
#
# Required GitHub Secrets:
#   GITLAB_PUSH_TOKEN — GitLab personal access token with write_repository scope
# ---------------------------------------------------------------------------

name: Mirror to GitLab

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  # If you had a 'test' job here, it would run every time.
  
  mirror:
    runs-on: ubuntu-latest
    # This 'if' prevents the loop by checking the pusher.
    # It skips if the push came from the GitLab token (you) via CI.
    if: github.actor != 'github-actions[bot]' && (github.ref_name == 'main' || github.ref_name == 'develop')

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is mandatory for hash parity; it fetches all tags and history
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
        run: |
          # Add the GitLab remote using the OAuth2 token for authentication
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@git.ucsc.edu/microfaults/manteion-ui.git"
          BRANCH_NAME="${{ github.ref_name }}"
          
          # CRITICAL: We pass a push option that GitLab interprets as a CI variable.
          # This ensures AI Review RUNS, but the GitLab mirror job STOPS.
          git push gitlab "refs/heads/$BRANCH_NAME:refs/heads/$BRANCH_NAME" \
            --force \
            -o "ci.variable=SKIP_MIRROR=true"
          
          echo "✅ Mirrored to GitLab. AI Review will trigger, Mirror job will be skipped."
