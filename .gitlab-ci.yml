workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - check
  - build

default:
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.0 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

lint:
  stage: check
  script:
    - pnpm lint

typecheck:
  stage: check
  script:
    - pnpm typecheck

test:
  stage: check
  script:
    - pnpm test

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 3 days
