workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - check
  - build
  - mirror

default:
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.0 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

lint:
  stage: check
  script:
    - pnpm lint

typecheck:
  stage: check
  script:
    - pnpm typecheck

test:
  stage: check
  script:
    - pnpm test

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 3 days

# ---------------------------------------------------------------------------
# Mirror to GitHub — Push merged branches to GitHub
#
# Triggers on push to main/develop (i.e., when an MR is merged on GitLab).
# Pushes the same commit to the corresponding branch on GitHub.
#
# Required GitLab CI/CD Variables (Settings > CI/CD > Variables, masked):
#   GITHUB_PUSH_TOKEN — GitHub personal access token with repo scope
# ---------------------------------------------------------------------------

mirror-to-github:
  stage: mirror
  image: alpine:latest

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
      when: always

  before_script:
    - apk add --no-cache git

  script:
    - git remote add github "https://x-access-token:${GITHUB_PUSH_TOKEN}@github.com/microfaults/manteion-ui.git"
    - git push github "HEAD:refs/heads/${CI_COMMIT_BRANCH}" --force
    - echo "✅ Pushed ${CI_COMMIT_BRANCH} to GitHub"
